<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mean, Median, Mode & Range Calculator — Free Online Tool</title>
<link rel="canonical" href="https://usafincalc.com/mean-median-mode-range-calculator"/>
<meta name="robots" content="index, follow"/>
<meta name="description" content="Calculate mean, median, mode, and range for any data set. Free online statistics calculator."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/search.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAF9F6;--bg2:#FFFFFF;--bg3:#F2EFE8;--card:#FFFFFF;--border:#E4E0D6;--text:#1A2433;--muted:#5C6B7F;--accent:#C99A3B;--green:#2E6B4F;--font:'Inter',sans-serif;--display:'Fraunces',serif;--r:14px;--rs:8px}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;display:flex;justify-content:center}
.container{max-width:700px;width:100%}
h1{font-size:32px;font-weight:700;background:linear-gradient(135deg,#C99A3B,#0F2A4A);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 12px 30px -10px rgba(15,42,74,.12);padding:24px;margin-bottom:16px}
textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:12px;font-family:'Courier New',monospace;min-height:80px;resize:vertical;outline:none}
textarea:focus{border-color:var(--accent)}
.btn{background:var(--accent);color:#FFFFFF;border:none;border-radius:var(--rs);padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;width:100%;margin-top:8px}
.btn:hover{background:#B8862F}
.results-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-top:16px}
.stat-card{background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center}
.stat-card .val{font-size:22px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
@media(max-width:500px){.results-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<nav style="background:#0F2A4A;color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;margin:-20px -20px 20px -20px">
<a href="/" style="display:flex;align-items:center;gap:9px;text-decoration:none;color:#fff">
<div style="width:28px;height:28px;border-radius:6px;background:#C99A3B;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;color:#0F2A4A;font-size:14px">$</div>
<span style="font-family:'Fraunces',serif;font-weight:600;font-size:16px">USA<span style="color:#E8C878">FinCalc</span></span>
</a>
<div class="site-nav-search" role="search" style="margin:0 16px;max-width:220px"><input type="search" id="fc-search" placeholder="Search calculators..." autocomplete="off" aria-label="Search all calculators" style="padding:7px 12px;font-size:13px"></div>
<a href="/" style="color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:500">← All Calculators</a>
</nav>
<div class="container">
<h1>Mean, Median, Mode &amp; Range Calculator</h1>
<p class="sub">Enter numbers separated by commas or spaces.</p>
<div class="card">
<textarea id="data" placeholder="e.g., 10, 15, 20, 25, 30">10, 15, 20, 25, 30</textarea>
<button class="btn" onclick="calculate()">Calculate →</button>
<div class="results-grid" id="results">
<div class="stat-card"><div class="val" id="mean">20</div><div class="label">Mean</div></div>
<div class="stat-card"><div class="val" id="median">20</div><div class="label">Median</div></div>
<div class="stat-card"><div class="val" id="mode">No mode</div><div class="label">Mode</div></div>
<div class="stat-card"><div class="val" id="range">20</div><div class="label">Range</div></div>
</div>
</div>
</div>
<script>
function calculate(){
const raw=document.getElementById('data').value;
const nums=raw.split(/[,\s]+/).map(Number).filter(n=>!isNaN(n)&&n!==undefined&&n!==null);
if(nums.length===0){return;}
const sorted=[...nums].sort((a,b)=>a-b);
const n=nums.length;
const mean=nums.reduce((a,b)=>a+b,0)/n;
const median=n%2===1?sorted[Math.floor(n/2)]:(sorted[n/2-1]+sorted[n/2])/2;
const freq={};nums.forEach(x=>freq[x]=(freq[x]||0)+1);
let maxFreq=0,modes=[];for(let k in freq){if(freq[k]>maxFreq){maxFreq=freq[k];modes=[k];}else if(freq[k]===maxFreq){modes.push(k);}}
const modeStr=modes.length===nums.length?'No mode':(modes.length===1?modes[0]:modes.join(', '));
const range=sorted[n-1]-sorted[0];
document.getElementById('mean').textContent=mean.toFixed(2);
document.getElementById('median').textContent=median.toFixed(2);
document.getElementById('mode').textContent=modeStr;
document.getElementById('range').textContent=range.toFixed(2);
}
calculate();
</script>
<script defer src="/js/search.js"></script>
</body>
</html>
