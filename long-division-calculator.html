*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAF9F6;--bg2:#FFFFFF;--bg3:#F2EFE8;--card:#FFFFFF;--border:#E4E0D6;--border2:#D8D2C4;--text:#1A2433;--muted:#5C6B7F;--accent:#C99A3B;--green:#2E6B4F;--gold:#C97A3B;--orange:#B5652E;--font:'Inter',sans-serif;--display:'Fraunces',serif;--mono:'DM Mono',monospace;--r:14px;--rs:8px}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;display:flex;justify-content:center;min-height:100vh}

label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-size:18px;padding:10px 14px;font-family:var(--mono);outline:none;margin-bottom:8px}
input:focus{border-color:var(--accent)}

.btn{background:var(--accent);color:#FFFFFF;border:none;border-radius:var(--rs);padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;width:100%}
.btn:hover{background:#B8862F}
.btn-green{background:var(--green);color:#FFFFFF}

.result-box{background:var(--bg3);border-radius:var(--rs);padding:16px;margin-top:12px}

.result-box .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.steps-box{background:var(--bg2);border-radius:var(--rs);padding:16px;margin-top:12px;max-height:300px;overflow-y:auto;font-family:var(--mono);font-size:14px;line-height:1.8;color:var(--text)}
.steps-box .step{color:var(--muted);margin-bottom:4px}
.steps-box .step .highlight{color:var(--gold)}
.steps-box .step .result-num{color:var(--accent)}
.remainder-box{background:var(--bg2);border-radius:var(--rs);padding:12px 16px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:15px}

.remainder-box .rem-value{color:var(--gold);font-weight:600}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}

<div class="container">
<h1>Long Division Calculator</h1>
<p class="sub">Divide numbers with step-by-step long division process</p>

<div class="card">
<div class="grid-2">
<div><label>Dividend (number to divide)</label><input id="dividend" type="number" value="1575" oninput="calculateLongDivision()"/></div>
<div><label>Divisor (number to divide by)</label><input id="divisor" type="number" value="12" oninput="calculateLongDivision()"/></div>
</div>
<button class="btn btn-green" onclick="calculateLongDivision()">Divide</button>

<div class="result-box" id="result">
<div class="label">Result</div>
<div class="result" id="division-result">1575 ÷ 12 = 131 remainder 3</div>
</div>

<div class="remainder-box">
<span class="rem-label">Remainder</span>
<span class="rem-value" id="remainder-display">3</span>
</div>

<div class="steps-box" id="steps">
<div class="step">Step-by-step long division will appear here.</div>
</div>
</div>
</div>

<script>
function calculateLongDivision() {
const dividend = parseInt(document.getElementById('dividend').value) || 0;
const divisor = parseInt(document.getElementById('divisor').value) || 1;

if (divisor === 0) {
document.getElementById('division-result').textContent = 'Error: Cannot divide by zero';
document.getElementById('remainder-display').textContent = '—';
document.getElementById('steps').innerHTML = '<div class="step">Division by zero is undefined.</div>';
return;
}

const sign = (dividend < 0) !== (divisor < 0) ? '-' : '';
const a = Math.abs(dividend);
const b = Math.abs(divisor);

const quotient = Math.floor(a / b);
const remainder = a % b;

document.getElementById('division-result').textContent = 
sign + dividend + ' ÷ ' + divisor + ' = ' + sign + quotient + ' remainder ' + remainder;
document.getElementById('remainder-display').textContent = remainder;

// Generate step-by-step
let steps = [];
const digits = String(a).split('').map(Number);
let current = 0;
let resultDigits = [];

steps.push('📐 Long division: ' + a + ' ÷ ' + b);
steps.push('');

for (let i = 0; i < digits.length; i++) {
current = current * 10 + digits[i];
const digitQuotient = Math.floor(current / b);
resultDigits.push(digitQuotient);
const subtract = digitQuotient * b;
const newCurrent = current - subtract;

if (digitQuotient > 0 || i === digits.length - 1 || resultDigits.some(d => d > 0)) {
steps.push('Step ' + (i+1) + ': Bring down ' + digits[i]);
steps.push('  → Current number: ' + current);
steps.push('  → ' + current + ' ÷ ' + b + ' = ' + digitQuotient + ' (digit ' + (i+1) + ' of quotient)');
steps.push('  → ' + digitQuotient + ' × ' + b + ' = ' + subtract);
steps.push('  → Subtract: ' + current + ' - ' + subtract + ' = ' + newCurrent);
if (i < digits.length - 1) {
steps.push('  → Remainder carried: ' + newCurrent);
}
steps.push('');
} else {
steps.push('Step ' + (i+1) + ': Bring down ' + digits[i] + ' → ' + current + ' < ' + b + ', quotient digit = 0');
steps.push('');
}

current = newCurrent;
}

const finalQuotient = parseInt(resultDigits.join('')) || 0;
steps.push('✅ Final quotient: ' + finalQuotient);
steps.push('✅ Remainder: ' + current);
steps.push('✅ ' + a + ' = ' + finalQuotient + ' × ' + b + ' + ' + current);
steps.push('✅ ' + a + ' ÷ ' + b + ' = ' + finalQuotient + ' R ' + current);

if (sign === '-') {
steps.push('⚠️ Original signs differed, result is negative: -' + finalQuotient + ' R ' + current);
}

document.getElementById('steps').innerHTML = steps.map(s => 
'<div class="step">' + s.replace(/\d+/g, match => 
'<span class="highlight">' + match + '</span>'
) + '</div>'
).join('');
}

calculateLongDivision();
</script>
