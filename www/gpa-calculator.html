<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GPA Calculator — Free Online Tool</title>
<link rel="canonical" href="https://usafincalc.com/gpa-calculator"/>
<meta name="robots" content="index, follow"/>
<meta name="description" content="Calculate your cumulative GPA. Enter courses, credits, and grades. Supports weighted and unweighted GPA. Free online GPA calculator."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAF9F6;--bg2:#FFFFFF;--bg3:#F2EFE8;--card:#FFFFFF;--border:#E4E0D6;--text:#1A2433;--muted:#5C6B7F;--accent:#C99A3B;--green:#2E6B4F;--gold:#C97A3B;--font:'Inter',sans-serif;--display:'Fraunces',serif;--r:14px;--rs:8px}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;display:flex;justify-content:center}
.container{max-width:800px;width:100%}
h1{font-size:32px;font-weight:700;background:linear-gradient(135deg,#C99A3B,#0F2A4A);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 12px 30px -10px rgba(15,42,74,.12);padding:24px;margin-bottom:16px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
input,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:10px;font-family:var(--font);outline:none}
input:focus,select:focus{border-color:var(--accent)}
.grid-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;align-items:end}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{background:var(--accent);color:#FFFFFF;border:none;border-radius:var(--rs);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#B8862F}
.btn-sm{background:var(--bg3);color:var(--muted);border:1px solid var(--border);padding:6px 12px;font-size:12px;border-radius:var(--rs);cursor:pointer}
.btn-sm:hover{background:rgba(15,42,74,0.05)}
.btn-danger{color:#B5495A}
.btn-danger:hover{background:rgba(181,73,90,0.1)}
.course-row{display:grid;grid-template-columns:2fr 1fr 1fr 40px;gap:10px;margin-bottom:8px;align-items:center}
.course-row input,.course-row select{padding:8px;font-size:14px;margin-bottom:0}
.result-box{background:var(--bg3);border-radius:var(--rs);padding:20px;text-align:center;margin-top:16px}
.result-box .gpa{font-size:48px;font-weight:700;color:var(--accent)}
.result-box .label{font-size:13px;color:var(--muted)}
.result-box .detail{font-size:14px;color:var(--muted);margin-top:8px}
.grade-scale{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:12px 0;font-size:13px;color:var(--muted)}
.grade-scale span{background:var(--bg3);padding:6px 10px;border-radius:var(--rs);text-align:center}
@media(max-width:600px){.course-row{grid-template-columns:1fr 1fr 40px}.course-row .hide-mobile{display:none}.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav style="background:#0F2A4A;color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;margin:-20px -20px 20px -20px">
<a href="/" style="display:flex;align-items:center;gap:9px;text-decoration:none;color:#fff">
<div style="width:28px;height:28px;border-radius:6px;background:#C99A3B;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;color:#0F2A4A;font-size:14px">$</div>
<span style="font-family:'Fraunces',serif;font-weight:600;font-size:16px">USA<span style="color:#E8C878">FinCalc</span></span>
</a>
<a href="/#math-h" style="color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:500">← All Math Calculators</a>
</nav>
<div class="container">
<h1>GPA Calculator</h1>
<p class="sub">Calculate your cumulative GPA. Add courses, credits, and grades.</p>

<div class="card">
<div class="grade-scale">
<span>A = 4.0</span><span>B = 3.0</span><span>C = 2.0</span><span>D = 1.0</span><span>F = 0.0</span>
</div>
<div id="courses">
<div class="course-row">
<input placeholder="Course Name" value="Math 101"/>
<select>
<option value="4.0">A (4.0)</option>
<option value="3.7">A- (3.7)</option>
<option value="3.3">B+ (3.3)</option>
<option value="3.0" selected>B (3.0)</option>
<option value="2.7">B- (2.7)</option>
<option value="2.3">C+ (2.3)</option>
<option value="2.0">C (2.0)</option>
<option value="1.7">C- (1.7)</option>
<option value="1.0">D (1.0)</option>
<option value="0.0">F (0.0)</option>
</select>
<input type="number" value="3" min="0.5" step="0.5" style="width:70px"/>
<button class="btn-sm btn-danger" onclick="removeRow(this)">✕</button>
</div>
<div class="course-row">
<input placeholder="Course Name" value="English 101"/>
<select>
<option value="4.0">A (4.0)</option>
<option value="3.7">A- (3.7)</option>
<option value="3.3">B+ (3.3)</option>
<option value="3.0">B (3.0)</option>
<option value="2.7">B- (2.7)</option>
<option value="2.3">C+ (2.3)</option>
<option value="2.0" selected>C (2.0)</option>
<option value="1.7">C- (1.7)</option>
<option value="1.0">D (1.0)</option>
<option value="0.0">F (0.0)</option>
</select>
<input type="number" value="3" min="0.5" step="0.5" style="width:70px"/>
<button class="btn-sm btn-danger" onclick="removeRow(this)">✕</button>
</div>
<div class="course-row">
<input placeholder="Course Name" value="Science 101"/>
<select>
<option value="4.0" selected>A (4.0)</option>
<option value="3.7">A- (3.7)</option>
<option value="3.3">B+ (3.3)</option>
<option value="3.0">B (3.0)</option>
<option value="2.7">B- (2.7)</option>
<option value="2.3">C+ (2.3)</option>
<option value="2.0">C (2.0)</option>
<option value="1.7">C- (1.7)</option>
<option value="1.0">D (1.0)</option>
<option value="0.0">F (0.0)</option>
</select>
<input type="number" value="4" min="0.5" step="0.5" style="width:70px"/>
<button class="btn-sm btn-danger" onclick="removeRow(this)">✕</button>
</div>
</div>
<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
<button class="btn" style="width:auto" onclick="addRow()">+ Add Course</button>
<button class="btn" style="width:auto;background:var(--green);color:#FFFFFF" onclick="calculateGPA()">Calculate GPA</button>
</div>
<div class="result-box" id="result">
<div class="label">Current GPA</div>
<div class="gpa" id="gpa-display">3.33</div>
<div class="detail" id="gpa-detail">Total Credits: 10 · Grade Points: 33.3</div>
</div>
</div>
</div>
<script>
function addRow(){
const div=document.createElement('div');
div.className='course-row';
div.innerHTML=`
<input placeholder="Course Name"/>
<select>
<option value="4.0">A (4.0)</option>
<option value="3.7">A- (3.7)</option>
<option value="3.3">B+ (3.3)</option>
<option value="3.0" selected>B (3.0)</option>
<option value="2.7">B- (2.7)</option>
<option value="2.3">C+ (2.3)</option>
<option value="2.0">C (2.0)</option>
<option value="1.7">C- (1.7)</option>
<option value="1.0">D (1.0)</option>
<option value="0.0">F (0.0)</option>
</select>
<input type="number" value="3" min="0.5" step="0.5" style="width:70px"/>
<button class="btn-sm btn-danger" onclick="removeRow(this)">✕</button>
`;
document.getElementById('courses').appendChild(div);
}
function removeRow(el){if(document.querySelectorAll('.course-row').length>1)el.parentElement.remove();}
function calculateGPA(){
const rows=document.querySelectorAll('.course-row');
let totalPoints=0,totalCredits=0;
rows.forEach(row=>{
const grade=parseFloat(row.querySelector('select').value)||0;
const credits=parseFloat(row.querySelector('input[type="number"]').value)||0;
totalPoints+=grade*credits;
totalCredits+=credits;
});
const gpa=totalCredits>0?totalPoints/totalCredits:0;
document.getElementById('gpa-display').textContent=gpa.toFixed(2);
document.getElementById('gpa-detail').textContent='Total Credits: '+totalCredits+' · Grade Points: '+totalPoints.toFixed(1);
}
calculateGPA();
</script>
</body>
</html>
