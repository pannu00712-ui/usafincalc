<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAF9F6;--bg2:#FFFFFF;--bg3:#F2EFE8;--card:#FFFFFF;--border:#E4E0D6;--text:#1A2433;--muted:#5C6B7F;--accent:#C99A3B;--green:#2E6B4F;--font:'Inter',sans-serif;--display:'Fraunces',serif;--r:14px;--rs:8px}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;display:flex;justify-content:center}
.container{max-width:650px;width:100%}
h1{font-size:32px;font-weight:700;background:linear-gradient(135deg,#C99A3B,#0F2A4A);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 12px 30px -10px rgba(15,42,74,.12);padding:24px;margin-bottom:16px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
input,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:16px;padding:10px;font-family:var(--font);outline:none}
input:focus,select:focus{border-color:var(--accent)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{background:var(--accent);color:#FFFFFF;border:none;border-radius:var(--rs);padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;width:100%;margin-top:8px}
.btn:hover{background:#B8862F}
.result{background:var(--bg3);border-radius:var(--rs);padding:16px;margin-top:12px;font-size:20px;font-weight:600;text-align:center;color:var(--green)}
.result .detail{font-size:14px;font-weight:400;color:var(--muted);display:block;margin-top:4px}
@media(max-width:500px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav style="background:#0F2A4A;color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;margin:-20px -20px 20px -20px">

<div class="container">
<h1>Confidence Interval Calculator</h1>
<p class="sub">Calculate confidence intervals for population mean.</p>
<div class="card">
<div class="grid-2">
<div><label>Sample Mean (x̄)</label><input id="mean" type="number" value="100" step="0.1" oninput="calcCI()"/></div>
<div><label>Sample Size (n)</label><input id="n" type="number" value="30" oninput="calcCI()"/></div>
<div><label>Std Deviation (σ)</label><input id="sd" type="number" value="15" step="0.1" oninput="calcCI()"/></div>
<div><label>Confidence Level (%)</label>
<select id="conf" oninput="calcCI()">
<option value="90">90%</option>
<option value="95" selected>95%</option>
<option value="99">99%</option>
</select>
</div>
</div>
<div class="result" id="result">(94.63, 105.37)<span class="detail">95% confidence interval for population mean</span></div>
</div>
</div>
<script>
function calcCI(){
const mean=+document.getElementById('mean').value||0,n=+document.getElementById('n').value||1,sd=+document.getElementById('sd').value||0;
const conf=+document.getElementById('conf').value||95;
if(n<2){document.getElementById('result').innerHTML='Sample size must be at least 2';return;}
const z=conf===90?1.645:(conf===95?1.96:2.576);
const se=sd/Math.sqrt(n);
const margin=z*se;
const lower=mean-margin,upper=mean+margin;
document.getElementById('result').innerHTML='('+lower.toFixed(2)+', '+upper.toFixed(2)+')<span class="detail">'+conf+'% confidence interval for population mean</span>';
}
calcCI();
</script>
