<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quadratic Formula Calculator — Free Online Tool</title>
<link rel="canonical" href="https://usafincalc.com/quadratic-formula-calculator"/>
<meta name="robots" content="index, follow"/>
<meta name="description" content="Solve quadratic equations using the quadratic formula. Find real and complex roots instantly."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAF9F6;--bg2:#FFFFFF;--bg3:#F2EFE8;--card:#FFFFFF;--border:#E4E0D6;--text:#1A2433;--muted:#5C6B7F;--accent:#C99A3B;--green:#2E6B4F;--font:'Inter',sans-serif;--display:'Fraunces',serif;--r:14px;--rs:8px}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;display:flex;justify-content:center}
.container{max-width:600px;width:100%}
h1{font-size:32px;font-weight:700;background:linear-gradient(135deg,#C99A3B,#0F2A4A);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 12px 30px -10px rgba(15,42,74,.12);padding:24px;margin-bottom:16px}
.equation{font-size:22px;text-align:center;color:var(--text);margin-bottom:16px;font-family:'Times New Roman',serif}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:end}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:18px;padding:10px;font-family:var(--font);text-align:center;outline:none}
input:focus{border-color:var(--accent)}
.btn{background:var(--accent);color:#FFFFFF;border:none;border-radius:var(--rs);padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;width:100%;margin-top:8px}
.btn:hover{background:#B8862F}
.result{background:var(--bg3);border-radius:var(--rs);padding:16px;margin-top:12px;font-size:18px;color:var(--green);text-align:center;line-height:1.8}
.roots{font-size:20px;font-weight:600;color:var(--text)}
@media(max-width:450px){.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav style="background:#0F2A4A;color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;margin:-20px -20px 20px -20px">
<a href="/" style="display:flex;align-items:center;gap:9px;text-decoration:none;color:#fff">
<div style="width:28px;height:28px;border-radius:6px;background:#C99A3B;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;color:#0F2A4A;font-size:14px">$</div>
<span style="font-family:'Fraunces',serif;font-weight:600;font-size:16px">USA<span style="color:#E8C878">FinCalc</span></span>
</a>
<a href="/#math-h" style="color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:500">← All Math Calculators</a>
</nav>
<div class="container">
<h1>Quadratic Formula Calculator</h1>
<p class="sub">Solve ax² + bx + c = 0</p>
<div class="card">
<div class="equation">ax² + bx + c = 0</div>
<div class="grid-3">
<div><label>a</label><input id="a" type="number" value="2" oninput="solve()"/></div>
<div><label>b</label><input id="b" type="number" value="5" oninput="solve()"/></div>
<div><label>c</label><input id="c" type="number" value="-3" oninput="solve()"/></div>
</div>
<div class="result" id="result">x = 0.5 and x = -3</div>
</div>
</div>
<script>
function solve(){
const a=+document.getElementById('a').value||0,b=+document.getElementById('b').value||0,c=+document.getElementById('c').value||0;
if(a===0){document.getElementById('result').innerHTML='Not a quadratic equation (a=0)';return;}
const d=b*b-4*a*c;
if(d<0){
const real=(-b/(2*a)).toFixed(4);
const imag=(Math.sqrt(-d)/(2*a)).toFixed(4);
document.getElementById('result').innerHTML='x = '+real+' ± '+imag+'i';
}else if(d===0){
const x=(-b/(2*a)).toFixed(4);
document.getElementById('result').innerHTML='x = '+x+' (double root)';
}else{
const x1=((-b+Math.sqrt(d))/(2*a)).toFixed(4);
const x2=((-b-Math.sqrt(d))/(2*a)).toFixed(4);
document.getElementById('result').innerHTML='x = '+x1+' and x = '+x2;
}
}
solve();
</script>
</body>
</html>
